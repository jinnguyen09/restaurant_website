<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Quản Trị - PHỞ HẨM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="/css/admin.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
    .search-container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .btn-add { background-color: #c62828; color: white; border: none; padding: 10px 20px; text-decoration: none; display: inline-block; }
    .btn-add:hover { background-color: #a52727; color: white; }

    .food-card { background: white; border-radius: 15px; padding: 15px; border: 1px solid #eee; transition: all 0.3s ease-in-out; position: relative; overflow: hidden; }
    .food-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; border-color: #ddd; }

    .food-card.unavailable {
      background-color: #f8f9fa;
      border-color: #dee2e6;
    }
    .food-card.unavailable .food-img-container,
    .food-card.unavailable .flex-grow-1 h5,
    .food-card.unavailable .mb-2,
    .food-card.unavailable p,
    .food-card.unavailable .small,
    .food-card.unavailable .mt-2 > div:first-child {
      opacity: 0.4;
      filter: grayscale(50%);
    }
    .badge-stopped {
      background-color: #495057;
      color: white;
      border: 1px solid #343a40;
      opacity: 1 !important;
      filter: none !important;
    }
    .food-card.unavailable .d-flex.gap-2 {
      opacity: 1 !important;
      filter: none !important;
      z-index: 20;
    }
    .food-img-container { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
    .food-img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .price-new { color: #d32f2f; font-weight: 800; font-size: 1.25rem; }
    .price-old { color: #999; text-decoration: line-through; font-size: 0.85rem; margin-left: 5px; }

    .badge-sale { position: absolute; top: -10px; left: -10px; background: linear-gradient(45deg, #ff4757, #ff6b81); color: white; padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 0.75rem; box-shadow: 0 4px 10px rgba(255, 71, 87, 0.3); z-index: 10; }
    .badge-outline-red { border: 1px solid #d32f2f; color: #d32f2f; background: transparent; }
    .badge-instock { background-color: #00c853; color: white; }

    .btn-action { width: 35px; height: 35px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 8px; text-decoration: none; transition: 0.2s; }
    .btn-edit { border: 1px solid #42a5f5; color: #42a5f5; background: white; }
    .btn-delete { border: 1px solid #ef5350; color: #ef5350; background: white; }
    .btn-edit:hover { background-color: #42a5f5 !important; color: white !important; }
    .btn-delete:hover { background-color: #ef5350 !important; color: white !important; }
  </style>
</head>
<body class="bg-light">
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='menu')}"></div>

<div class="container py-5">
  <div class="d-flex align-items-center p-3 bg-white shadow-sm rounded-4 border-start border-danger border-4 mb-4">
    <div class="bg-danger-subtle p-2 rounded-3 me-3 d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
      <i class="fa-solid fa-shop text-danger fs-5"></i>
    </div>
    <div class="flex-grow-1">
      <p class="text-muted small mb-0">Hệ thống đang quản lý thực đơn tại:</p>
      <h4 th:class="${currentBranch == null ? 'fw-bold mb-0 text-danger' : 'fw-bold mb-0 text-dark'}"
          th:text="${currentBranch != null ? currentBranch.name : 'VUI LÒNG CHỌN CHI NHÁNH!'}">
      </h4>
    </div>
  </div>

  <div th:if="${success}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm mb-4" style="border-radius: 12px;">
    <i class="fa-solid fa-circle-check me-2"></i> <span th:text="${success}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <form th:action="@{/admin/menu}" method="get" class="search-container d-flex gap-3 mb-4 align-items-center">
    <div class="input-group flex-grow-1">
      <span class="input-group-text bg-light border-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
      <input type="text" name="keyword" th:value="${param.keyword}" class="form-control bg-light border-0" placeholder="Tìm kiếm món ăn...">
    </div>
    <div style="min-width: 180px;">
      <select name="categoryId" class="form-select bg-light border-0" onchange="this.form.submit()">
        <option value="">Tất cả danh mục</option>
        <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"
                th:selected="${param.categoryId != null && param.categoryId[0] == cat.categoryId.toString()}"></option>
      </select>
    </div>
    <a th:href="@{/admin/menu/add}" class="btn btn-add rounded-3 shadow-sm"><i class="fa-solid fa-plus"></i> Thêm món mới</a>
  </form>

  <div class="row g-4">
    <div class="col-md-6" th:each="item : ${products}">
      <div class="food-card d-flex gap-3 shadow-sm" th:classappend="${!item.isAvailable ? 'unavailable' : ''}">

        <div class="food-img-container">
          <span th:if="${item.discountPrice != null && item.discountPrice < item.price}" class="badge-sale">
             <i class="fa-solid fa-bolt me-1"></i> GIẢM GIÁ
          </span>
          <img th:src="${item.product.imageUrl != null ? item.product.imageUrl : 'https://via.placeholder.com/200'}"
               class="food-img" th:alt="${item.product.name}">
        </div>

        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start">
            <h5 class="fw-bold mb-1 text-dark" th:text="${item.product.name}">Tên món ăn</h5>
            <span class="small text-muted fw-semibold">
                <i class="fa-solid fa-fire-flame-curved text-warning me-1"></i>
                <span th:text="'Số lượng bán: ' + ${item.stockQuantity != null ? item.stockQuantity : 0}"></span>
            </span>
          </div>

          <div class="mb-2">
            <span class="badge badge-outline-red" th:text="${item.product.category != null ? item.product.category.categoryName : 'Khác'}"></span>
            <span class="badge px-2 py-1 rounded-pill fw-bold" style="background: linear-gradient(135deg, #f97316, #ef4444); color: white;" th:if="${item.isFeatured}">🔥 Bán chạy</span>

            <span th:if="${item.isAvailable}" class="badge badge-instock"><i class="fa-solid fa-check me-1"></i>Đang bán</span>
            <span th:unless="${item.isAvailable}" class="badge badge-stopped bg-secondary shadow-sm">
                <i class="fa-solid fa-ban me-1"></i>Ngừng bán
            </span>
          </div>

          <p class="text-muted small mb-2 text-truncate-2" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 0.8rem;"
             th:text="${item.product.description}">Mô tả ngắn về món ăn...</p>

          <div class="d-flex gap-3 mb-2 small text-muted">
            <span th:if="${item.product.unit != null}"><i class="fa-solid fa-weight-scale me-1"></i><span th:text="${item.product.unit}"></span></span>
            <span th:if="${item.product.preparationTime != null}"><i class="fa-regular fa-clock me-1"></i><span th:text="${item.product.preparationTime} + ' phút'"></span></span>
          </div>

          <div class="d-flex justify-content-between align-items-end mt-2">
            <div>
              <th:block th:if="${item.discountPrice != null && item.discountPrice < item.price}">
                <div class="price-new text-danger fw-bold fs-5" th:text="${#numbers.formatInteger(item.discountPrice, 0, 'POINT')} + 'đ'"></div>
                <div class="price-old text-muted text-decoration-line-through small" th:text="${#numbers.formatInteger(item.price, 0, 'POINT')} + 'đ'"></div>
              </th:block>

              <th:block th:unless="${item.discountPrice != null && item.discountPrice < item.price}">
                <div class="price-new fw-bold fs-5" th:text="${#numbers.formatInteger(item.price, 0, 'POINT')} + 'đ'"></div>
              </th:block>
            </div>

            <div class="d-flex gap-2" style="opacity: 1 !important;">
              <a th:href="@{/admin/menu/edit/{id}(id=${item.product.productId})}" class="btn btn-action btn-edit"><i class="fa-solid fa-pencil"></i></a>
              <a href="javascript:void(0)" th:data-id="${item.product.productId}" th:data-name="${item.product.name}" class="btn btn-action btn-delete btn-delete-confirm">
                <i class="fa-solid fa-trash-can"></i>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div th:if="${#lists.isEmpty(products)}" class="text-center py-5">
    <img src="https://cdn-icons-png.flaticon.com/512/7486/7486744.png" width="80" class="mb-3 opacity-25">
    <p class="text-muted">Không tìm thấy món ăn nào.</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    const alerts = document.querySelectorAll('.alert');
    alerts.forEach(function(alert) {
      setTimeout(function() {
        if (typeof bootstrap !== 'undefined') {
          const bsAlert = new bootstrap.Alert(alert);
          bsAlert.close();
        } else {
          alert.style.display = 'none';
        }
      }, 3000);
    });

    const deleteButtons = document.querySelectorAll('.btn-delete-confirm');
    deleteButtons.forEach(button => {
      button.addEventListener('click', function() {
        const productId = this.getAttribute('data-id');
        const productName = this.getAttribute('data-name');
        Swal.fire({
          title: 'Xác nhận xóa?',
          text: `Món "${productName}" sẽ bị xóa khỏi thực đơn!`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#d33',
          confirmButtonText: 'Đồng ý xóa',
          cancelButtonText: 'Hủy'
        }).then((result) => {
          if (result.isConfirmed) {
            window.location.href = '/admin/menu/delete/' + productId;
          }
        });
      });
    });
  });
</script>
</body>
</html>
