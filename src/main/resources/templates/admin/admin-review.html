<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Quản Trị - PHỞ HẨM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="/css/admin.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* Thanh tìm kiếm và Bộ lọc sao */
    .filter-container {
      background: white;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .btn-filter-all { background-color: #c62828; color: white; border: none; }
    .btn-filter-all:hover { background-color: #e95250; color: white; }
    .btn-star { background: white; border: 1px solid #dee2e6; color: #333; font-size: 0.9rem; }
    .btn-star:hover { background-color: #f8f9fa; border-color: #adb5bd; }
    .star-icon { color: #ffc107; margin-left: 4px; }

    /* Card Đánh giá */
    .review-card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      border: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.03);
      margin-bottom: 24px;
      transition: all 0.3s ease;
    }
    .review-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.06);
    }

    /* Thông tin người dùng */
    .avatar-circle {
      width: 50px;
      height: 50px;
      background-color: #b71c1c;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: bold;
      border-radius: 50%;
    }

    /* Badge trạng thái */
    .status-badge {
      font-size: 0.75rem;
      padding: 4px 12px;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-waiting { background-color: #ffc107; color: white; }
    .badge-approved { background-color: #00c853; color: white; }

    /* Nội dung đánh giá */
    .review-content-box {
      background-color: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin: 15px 0;
      font-style: italic;
      color: #495057;
    }
    .food-tag {
      border: 1px solid #d32f2f;
      color: #d32f2f;
      padding: 2px 10px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Buttons */
    .btn-approve {
      background-color: #00a844;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      font-weight: 500;
    }

    .btn-approve:hover {
      background-color: #00c853;
      color: white;
      border: 1px solid #00a844;
    }
    .btn-reject {
      background-color: #d32f2f;
      color: white;
      border: 1px solid #d32f2f;
      padding: 10px;
      border-radius: 10px;
    }
    .btn-reject:hover {
      background-color: #e15151;
      color: white;
      border: none;
    }
    .btn-view {
      border: 1px solid #dee2e6;
      color: #6c757d;
      width: 45px;
      border-radius: 10px;
    }
    .btn-view:hover {
      background-color: #f8f9fa;
      color: #333;
      border: 1px solid #adb5bd;
    }
  </style>
</head>
<body>
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='review')}"></div>

<main class="container py-4">
  <div class="filter-container d-flex gap-3 align-items-center mb-4">
    <div class="input-group">
      <span class="input-group-text bg-light border-0"><i class="fa fa-search text-muted"></i></span>
      <input type="text" class="form-control bg-light border-0" placeholder="Tìm tên khách, món ăn...">
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-filter-all px-3 rounded-3">Tất cả</button>
      <button class="btn btn-star px-2 rounded-3">5<i class="fa fa-star star-icon"></i></button>
      <button class="btn btn-star px-2 rounded-3">4<i class="fa fa-star star-icon"></i></button>
      <button class="btn btn-star px-2 rounded-3">3<i class="fa fa-star star-icon"></i></button>
      <button class="btn btn-star px-2 rounded-3">2<i class="fa fa-star star-icon"></i></button>
      <button class="btn btn-star px-2 rounded-3">1<i class="fa fa-star star-icon"></i></button>
    </div>
  </div>

  <div class="review-list">

    <div class="review-card">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar-circle">N</div>
          <div>
            <h6 class="fw-bold mb-0">Nguyễn Văn A</h6>
            <small class="text-muted">5/2/2026</small>
          </div>
        </div>
        <span class="status-badge badge-waiting">Chờ duyệt</span>
      </div>

      <div class="d-flex align-items-center gap-3 mb-2">
        <span class="food-tag">Phở Bò Tái</span>
        <div class="text-warning">
          <i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i>
        </div>
      </div>

      <div class="review-content-box">
        "Phở rất ngon, nước dùng đậm đà, thịt bò tươi mềm. Sẽ quay lại!"
      </div>

      <div class="row g-2">
        <div class="col-md-5">
          <button class="btn btn-approve w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="fa-regular fa-circle-check"></i> Phê duyệt
          </button>
        </div>
        <div class="col-md-5">
          <button class="btn btn-reject w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="fa-regular fa-circle-xmark"></i> Từ chối
          </button>
        </div>
        <div class="col-md-2 text-end">
          <button class="btn btn-view h-100 w-100"><i class="fa-regular fa-eye"></i></button>
        </div>
      </div>
    </div>

    <div class="review-card">
      <div class="d-flex justify-content-between align-items-start mb-3">
        <div class="d-flex align-items-center gap-3">
          <div class="avatar-circle" style="background-color: #b71c1c;">T</div>
          <div>
            <h6 class="fw-bold mb-0">Trần Thị B</h6>
            <small class="text-muted">4/2/2026</small>
          </div>
        </div>
        <span class="status-badge badge-approved">Đã duyệt</span>
      </div>

      <div class="d-flex align-items-center gap-3 mb-2">
        <span class="food-tag">Bánh Mì Đặc Biệt</span>
        <div class="text-warning">
          <i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa-regular fa-star"></i>
        </div>
      </div>

      <div class="review-content-box">
        "Bánh mì ngon, nhân đầy đủ. Giá hợp lý."
      </div>
    </div>

  </div>
</main>
</body>
</html>
