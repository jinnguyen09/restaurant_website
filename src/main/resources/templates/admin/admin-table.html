<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản Lý Bàn - PHỞ HẨM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
  <link href="/css/admin.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
    .summary-card { border: none; border-radius: 12px; padding: 15px; display: flex; align-items: center; }
    .summary-icon { width: 45px; height: 45px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 15px; font-size: 1.2rem; }
    .modal-content { border-radius: 24px; border: none; overflow: hidden; }
    :root { --status-free: #00b894; --status-serving: #ff0032; --status-reserved: #f39c12; }
    .table-card { border: none; border-radius: 24px; background: white; transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); cursor: pointer; border: 1px solid #eee; overflow: hidden; height: 100%; position: relative; }
    .table-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.12); border-color: rgba(0,0,0,0.05); }
    .table-thumb { height: 160px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; margin: 10px; border-radius: 20px; }
    .table-thumb i { font-size: 2.5rem; margin-bottom: 8px; opacity: 0.9; }
    .table-thumb h3 { font-weight: 700; margin: 0; }
    .status-pill { margin: 0 15px; padding: 6px; border-radius: 12px; color: white; font-weight: 700; font-size: 0.75rem; text-align: center; text-transform: uppercase; }
    .table-detail { padding: 15px 20px 20px; min-height: 110px; text-align: center; }

    .bg-free { background-color: var(--status-free); }
    .bg-serving { background-color: var(--status-serving); }
    .bg-reserved { background-color: var(--status-reserved); }

    .area-wrapper { position: relative; display: inline-block; }
    .btn-delete-area {
      position: absolute; top: -8px; right: -8px;
      background: #ff4757; color: white; border: none;
      border-radius: 50%; width: 22px; height: 22px;
      font-size: 10px; display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: 0.3s; z-index: 5; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    .area-wrapper:hover .btn-delete-area { opacity: 1; }

    .btn-add-table { background: #6c5ce7; border-color: #6c5ce7; color: white; }
    .btn-add-table:hover { background: #5b4bc4; border-color: #5b4bc4; color: white; }
  </style>
</head>
<body>
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='table')}"></div>

<main class="container my-4">
  <div class="row g-3 mb-4">
    <div class="col-md-3">
      <div class="summary-card bg-white shadow-sm">
        <div class="summary-icon bg-primary bg-opacity-10 text-primary"><i class="fa-solid fa-utensils"></i></div>
        <div><small class="text-secondary">Tổng số bàn</small><h4 class="fw-bold m-0" th:text="${totalCount}">0</h4></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card bg-white shadow-sm">
        <div class="summary-icon bg-success bg-opacity-10 text-success"><i class="fa-solid fa-circle-check"></i></div>
        <div><small class="text-secondary">Bàn trống</small><h4 class="fw-bold m-0 text-success" th:text="${freeCount}">0</h4></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card bg-white shadow-sm">
        <div class="summary-icon bg-danger bg-opacity-10 text-danger"><i class="fa-solid fa-users"></i></div>
        <div><small class="text-secondary">Đang phục vụ</small><h4 class="fw-bold m-0 text-danger" th:text="${servingCount}">0</h4></div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="summary-card bg-white shadow-sm">
        <div class="summary-icon bg-warning bg-opacity-10 text-warning"><i class="fa-solid fa-clock"></i></div>
        <div><small class="text-secondary">Đã đặt trước</small><h4 class="fw-bold m-0 text-warning" th:text="${reservedCount}">0</h4></div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
    <div class="d-flex gap-2 overflow-auto pb-2" style="max-width: 70%;">
      <a th:href="@{/admin/table}" class="btn rounded-pill px-4"
         th:classappend="${selectedAreaId == null ? 'btn-danger' : 'btn-outline-secondary'}">Tất cả</a>
      <div th:each="area : ${areas}" class="area-wrapper">
        <a th:href="@{/admin/table(areaId=${area.areaId})}" class="btn rounded-pill px-4"
           th:classappend="${selectedAreaId == area.areaId ? 'btn-danger' : 'btn-outline-secondary'}"
           th:text="${area.areaName}"></a>
        <button type="button" class="btn-delete-area" th:onclick="'confirmDeleteArea(' + ${area.areaId} + ')'">
          <i class="fa-solid fa-xmark"></i>
        </button>
        <form th:id="'delete-area-form-' + ${area.areaId}" th:action="@{/admin/table/area/delete/{id}(id=${area.areaId})}" method="post" style="display:none;"></form>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-primary rounded-pill px-3 fw-bold" data-bs-toggle="modal" data-bs-target="#modalAddArea">
        <i class="fa-solid fa-plus me-1"></i> Khu vực
      </button>
      <button class="btn btn-add-table rounded-pill px-3 fw-bold" data-bs-toggle="modal" data-bs-target="#modalAddTable">
        <i class="fa-solid fa-plus me-1"></i> Bàn mới
      </button>
    </div>
  </div>

  <div class="row g-4">
    <div class="col-6 col-md-4 col-lg-3" th:each="table : ${tables}">
      <div class="table-card" th:style="${table.status.name() == 'OCCUPIED' ? 'border: 2px solid #ff0032;' : ''}"
           data-bs-toggle="modal" th:data-bs-target="${'#modalTable' + table.tableId}">

        <div class="table-thumb" th:classappend="${table.status.name() == 'AVAILABLE' ? 'bg-free' : (table.status.name() == 'OCCUPIED' ? 'bg-serving' : 'bg-reserved')}">
          <i class="fa-solid fa-utensils"></i>
          <h3 th:text="${table.tableNumber}">Bàn</h3>
          <small><i class="fa-solid fa-user-group me-1"></i> <span th:text="${table.capacity}"></span> chỗ</small>
        </div>

        <div class="status-pill"
             th:classappend="${table.status.name() == 'AVAILABLE' ? 'bg-free' : (table.status.name() == 'OCCUPIED' ? 'bg-serving' : 'bg-reserved')}"
             th:text="${table.status.name() == 'AVAILABLE' ? 'Trống' : (table.status.name() == 'OCCUPIED' ? 'Phục vụ' : 'Đã đặt')}"></div>

        <div class="table-detail">
          <div th:if="${table.status.name() == 'AVAILABLE'}" class="text-success small fw-bold">Sẵn sàng</div>
          <div th:if="${table.status.name() == 'OCCUPIED'}" class="text-danger small fw-bold">Đang dùng bữa</div>
          <div th:if="${table.status.name() == 'RESERVED'}" class="text-warning small fw-bold">Chờ khách đến</div>
        </div>
      </div>

      <div th:if="${table.status.name() == 'AVAILABLE'}" class="modal fade" th:id="${'modalTable' + table.tableId}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content text-center py-4">
            <div class="modal-body">
              <div class="text-success fs-1 mb-3"><i class="fa-solid fa-circle-check"></i></div>
              <h4 class="fw-bold" th:text="${'Bàn ' + table.tableNumber}"></h4>
              <div class="d-grid gap-2 mt-4 px-4">
                <form th:action="@{/admin/table/update-status/{id}(id=${table.tableId})}" method="post">
                  <input type="hidden" name="status" value="OCCUPIED">
                  <button type="submit" class="btn btn-danger w-100 rounded-pill py-2">MỞ BÀN PHỤC VỤ</button>
                </form>
                <form th:action="@{/admin/table/update-status/{id}(id=${table.tableId})}" method="post">
                  <input type="hidden" name="status" value="RESERVED">
                  <button type="submit" class="btn btn-warning w-100 rounded-pill py-2 text-white">ĐẶT TRƯỚC BÀN</button>
                </form>
              </div>
              <button type="button" class="btn btn-link text-muted mt-3 small" th:onclick="'confirmDeleteTable(' + ${table.tableId} + ')'">Xóa bàn</button>
              <form th:id="'delete-table-form-' + ${table.tableId}" th:action="@{/admin/table/delete/{id}(id=${table.tableId})}" method="post" style="display:none;"></form>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${table.status.name() == 'OCCUPIED'}" class="modal fade" th:id="${'modalTable' + table.tableId}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-danger text-white">
              <h5 class="modal-title fw-bold" th:text="${'Bàn ' + table.tableNumber}"></h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 text-center">
              <i class="fa-solid fa-file-invoice-dollar fs-1 text-danger mb-3"></i>
              <h5 class="fw-bold">Thanh toán & Trả bàn</h5>
              <form th:action="@{/admin/table/update-status/{id}(id=${table.tableId})}" method="post" class="mt-4">
                <input type="hidden" name="status" value="AVAILABLE">
                <button type="submit" class="btn btn-success w-100 py-3 rounded-pill fw-bold">HOÀN TẤT THANH TOÁN</button>
              </form>
            </div>
          </div>
        </div>
      </div>

      <div th:if="${table.status.name() == 'RESERVED'}" class="modal fade" th:id="${'modalTable' + table.tableId}" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
          <div class="modal-content">
            <div class="modal-header bg-warning text-white">
              <h5 class="modal-title fw-bold" th:text="${'Bàn ' + table.tableNumber}"></h5>
              <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4 text-center">
              <i class="fa-solid fa-calendar-check fs-1 text-warning mb-3"></i>
              <h5 class="fw-bold">Khách đã đặt trước</h5>
              <div class="d-grid gap-2 mt-4">
                <form th:action="@{/admin/table/update-status/{id}(id=${table.tableId})}" method="post">
                  <input type="hidden" name="status" value="OCCUPIED">
                  <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold">NHẬN BÀN NGAY</button>
                </form>
                <form th:action="@{/admin/table/update-status/{id}(id=${table.tableId})}" method="post">
                  <input type="hidden" name="status" value="AVAILABLE">
                  <button type="submit" class="btn btn-outline-secondary w-100 py-2 rounded-pill">HỦY ĐẶT TRƯỚC</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="modal fade" id="modalAddArea" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form th:action="@{/admin/table/area/create}" method="post">
        <div class="modal-header"><h5 class="fw-bold">Thêm khu vực</h5></div>
        <div class="modal-body px-4">
          <label class="small fw-bold mb-1">Tên khu vực</label>
          <input type="text" name="areaName" class="form-control mb-3" placeholder="VD: Tầng VIP" required>
          <label class="small fw-bold mb-1">Mô tả</label>
          <textarea name="description" class="form-control" rows="2"></textarea>
        </div>
        <div class="modal-footer border-0">
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">LƯU KHU VỰC</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="modalAddTable" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form th:action="@{/admin/table/create}" method="post">
        <div class="modal-header"><h5 class="fw-bold">Thêm bàn mới</h5></div>
        <div class="modal-body px-4">
          <label class="small fw-bold mb-1">Khu vực</label>
          <select name="areaId" class="form-select mb-3" required>
            <option th:each="a : ${areas}" th:value="${a.areaId}" th:text="${a.areaName}"></option>
          </select>
          <label class="small fw-bold mb-1">Số bàn / Tên bàn</label>
          <input type="text" name="tableNumber" class="form-control mb-3" placeholder="VD: Bàn 01" required>
          <label class="small fw-bold mb-1">Sức chứa tối đa</label>
          <input type="number" name="capacity" class="form-control" value="4" required>
        </div>
        <div class="modal-footer border-0">
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">TẠO BÀN</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script th:inline="javascript">
  const successMsg = [[${success}]];
  const errorMsg = [[${error}]];

  if (successMsg) {
    Swal.fire({ icon: 'success', title: 'Thành công', text: successMsg, timer: 2000, showConfirmButton: false });
  }
  if (errorMsg) {
    Swal.fire({ icon: 'error', title: 'Lỗi', text: errorMsg });
  }

  function confirmDeleteArea(areaId) {
    Swal.fire({
      title: 'Xóa khu vực này?',
      text: "Tất cả bàn thuộc khu vực này cũng sẽ bị xóa!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#ff4757',
      cancelButtonColor: '#6c757d',
      confirmButtonText: 'Đúng, xóa nó!',
      cancelButtonText: 'Hủy'
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById('delete-area-form-' + areaId).submit();
      }
    });
  }

  function confirmDeleteTable(tableId) {
    Swal.fire({
      title: 'Bạn chắc chắn chứ?',
      text: "Dữ liệu bàn sẽ bị xóa vĩnh viễn!",
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#d33',
      cancelButtonText: 'Quay lại',
      confirmButtonText: 'Đồng ý xóa'
    }).then((result) => {
      if (result.isConfirmed) {
        document.getElementById('delete-table-form-' + tableId).submit();
      }
    });
  }
</script>
</body>
</html>
