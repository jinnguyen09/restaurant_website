<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Quản lý khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        .form-container { max-width: 800px; margin: 40px auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .avatar-preview { width: 120px; height: 120px; object-fit: cover; border-radius: 50%; border: 4px solid #f8f9fa; }
        .btn-save { background-color: #b71c1c; color: white; border-radius: 10px; padding: 12px 30px; border: none; transition: all 0.3s; }
        .btn-save:hover { background-color: #961515; transform: translateY(-2px); }
        .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; }
        .form-control, .form-select { border-radius: 10px; padding: 12px; border: 1px solid #dee2e6; }
        .form-control:focus { border-color: #b71c1c; box-shadow: 0 0 0 0.25rem rgba(183, 28, 28, 0.1); }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='customer')}"></div>

<div class="container">
    <div class="form-container">
        <div class="d-flex align-items-center gap-3 mb-4">
            <a th:href="@{/admin/customer}" class="btn btn-light rounded-circle shadow-sm"><i class="fa fa-arrow-left"></i></a>
            <h3 class="fw-bold m-0" th:text="${title}">Chỉnh sửa / Thêm mới</h3>
        </div>

        <form th:action="@{/admin/customer/save}" th:object="${customer}" method="post">
            <input type="hidden" th:field="*{userId}" />

            <div class="text-center mb-5">
                <img th:src="${customer.avatar != null && !customer.avatar.isEmpty() ? customer.avatar : 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}"
                     class="avatar-preview shadow-sm mb-3" alt="Avatar" />
                <h5 class="fw-bold mb-1" th:text="${customer.userId == null ? 'Người dùng mới' : customer.fullName}">Tên khách hàng</h5>
                <span class="badge bg-danger px-3 rounded-pill" th:text="${customer.userId == null ? 'TẠO MỚI' : 'CHỈNH SỬA'}">Trạng thái</span>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" th:field="*{fullName}" class="form-control"
                           th:readonly="${customer.userId != null}"
                           th:style="${customer.userId != null ? 'background: #f8f9fa;' : ''}" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Email liên hệ</label>
                    <input type="email" th:field="*{email}" class="form-control" required />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Số điện thoại</label>
                    <input type="text" th:field="*{phone}" class="form-control" required />
                </div>

                <div class="col-md-6" th:if="${customer.userId == null}">
                    <label class="form-label">Mật khẩu khởi tạo</label>
                    <input type="password" name="password" class="form-control" required minlength="6" />
                </div>

                <div class="col-md-6">
                    <label class="form-label">Thuộc chi nhánh</label>
                    <select name="restaurantId" class="form-select">
                        <option value="">-- Không thuộc chi nhánh (Hệ thống) --</option>
                        <option th:each="res : ${allRestaurants}"
                                th:value="${res.restaurantId}"
                                th:text="${res.name}"
                                th:selected="${currentRestaurantId == res.restaurantId}">Chi nhánh A</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Phân quyền hệ thống</label>
                    <select name="roleId" class="form-select" required>
                        <option value="">-- Chọn quyền hạn --</option>
                        <option th:each="r : ${allRoles}"
                                th:value="${r.roleId}"
                                th:text="${r.name}"
                                th:selected="${currentRoleId == r.roleId}">BOSS</option>
                    </select>
                </div>

                <div class="col-12 mt-5 d-flex gap-3">
                    <button type="submit" class="btn btn-save flex-grow-1 fw-bold shadow-sm">
                        <i class="fa fa-save me-2"></i>
                        <span th:text="${customer.userId == null ? 'Tạo người dùng' : 'Lưu thay đổi'}">Lưu</span>
                    </button>
                    <a th:href="@{/admin/customer}" class="btn btn-light border flex-grow-1 fw-bold rounded-3 d-flex align-items-center justify-content-center">
                        Hủy bỏ
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
