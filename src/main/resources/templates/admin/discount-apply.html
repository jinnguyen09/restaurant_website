<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Áp dụng Khuyến mãi - PHỞ HẨM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        .table-container { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .product-img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; }
        .sticky-summary { position: sticky; top: 20px; background: #fff1f2; border: 1px solid #ffcccb; border-radius: 15px; padding: 20px; }
        .checkbox-lg { width: 22px; height: 22px; cursor: pointer; border: 2px solid #ff4757; }
        .checkbox-lg:checked { background-color: #ff4757; border-color: #ff4757; }
        optgroup { font-weight: bold; color: #ff4757; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='discount')}"></div>

<div class="container py-5">
    <div class="row g-4">
        <div class="col-lg-8">
            <div class="table-container">
                <div class="d-flex justify-content-between align-items-center mb-4 gap-3">
                    <h4 class="fw-bold mb-0 text-nowrap">Chọn món ăn</h4>

                    <select id="filterCategory" class="form-select form-select-sm w-auto border-0 bg-light shadow-sm py-2 px-3">
                        <option value="all">Tất cả danh mục</option>
                        <th:block th:each="parent : ${categories}" th:if="${parent.parent == null}">
                            <optgroup th:label="${parent.categoryName}">
                                <option th:value="${parent.categoryName}" th:text="'-- Tất cả ' + ${parent.categoryName}"></option>
                                <option th:each="child : ${categories}"
                                        th:if="${child.parent != null && child.parent.categoryId == parent.categoryId}"
                                        th:value="${child.categoryName}"
                                        th:text="${child.categoryName}">
                                </option>
                            </optgroup>
                        </th:block>
                    </select>

                    <div class="input-group w-50">
                        <span class="input-group-text bg-light border-0"><i class="fa-solid fa-magnifying-glass text-muted"></i></span>
                        <input type="text" id="searchProduct" class="form-control bg-light border-0" placeholder="Tìm tên món...">
                    </div>
                </div>

                <form th:action="@{/admin/discount/apply-process}" method="post" id="applyForm">
                    <input type="hidden" name="discountId" th:value="${discount.discountId}">

                    <div class="table-responsive">
                        <table class="table table-hover align-middle" id="productTable">
                            <thead class="table-light">
                            <tr>
                                <th width="40"><input type="checkbox" class="form-check-input checkbox-lg" id="selectAll"></th>
                                <th>Món ăn</th>
                                <th>Giá gốc</th>
                                <th class="text-danger">Giá sau giảm</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="item : ${branchProducts}"
                                th:data-category="${item.product.category.categoryName}"
                                th:data-parent="${item.product.category.parent != null ? item.product.category.parent.categoryName : item.product.category.categoryName}">
                                <td>
                                    <input type="checkbox" name="restaurantProductIds"
                                           th:value="${item.restaurantProductId}"
                                           th:checked="${appliedProductIds != null && #lists.contains(appliedProductIds, item.restaurantProductId)}"
                                           class="form-check-input checkbox-lg item-checkbox">
                                </td>
                                <td>
                                    <div class="d-flex align-items-center gap-3">
                                        <img th:src="${item.product.imageUrl}" class="product-img">
                                        <div>
                                            <div class="fw-bold product-name" th:text="${item.product.name}">Tên món</div>
                                            <small class="text-muted category-name"
                                                   th:text="${item.product.category.parent != null ? item.product.category.parent.categoryName + ' > ' + item.product.category.categoryName : item.product.category.categoryName}">
                                            </small>
                                        </div>
                                    </div>
                                </td>
                                <td class="fw-bold original-price" th:data-price="${item.price}"
                                    th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'"></td>
                                <td class="text-danger fw-bold preview-price">--</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-lg-4">
            <div class="sticky-summary shadow-sm">
                <h5 class="fw-bold text-danger mb-3"><i class="fa-solid fa-tag me-2"></i>Chi tiết khuyến mãi</h5>
                <hr>
                <div class="mb-3">
                    <label class="text-muted small">Tên chiến dịch:</label>
                    <div class="fw-bold" th:text="${discount.discountName}"></div>
                </div>
                <div class="mb-3">
                    <label class="text-muted small">Mức giảm:</label>
                    <div class="fs-4 fw-bold text-danger">
                        <span id="discountValue" th:text="${discount.discountValue}"></span>
                        <span id="discountType" th:text="${discount.discountType == 'PERCENTAGE' ? '%' : 'đ'}"></span>
                    </div>
                </div>
                <div class="mb-4 p-2 bg-white rounded-3 border">
                    <small class="text-muted d-block">Thời hạn:</small>
                    <span class="small fw-bold" th:text="${#temporals.format(discount.startDate, 'dd/MM/yyyy HH:mm')}"></span>
                    - <br>
                    <span class="small fw-bold" th:text="${#temporals.format(discount.endDate, 'dd/MM/yyyy HH:mm')}"></span>
                </div>

                <button type="button" onclick="document.getElementById('applyForm').submit()" class="btn btn-danger w-100 py-3 fw-bold rounded-3 shadow">
                    XÁC NHẬN ÁP DỤNG
                </button>
                <a th:href="@{/admin/discount}" class="btn btn-link w-100 text-muted mt-2 text-decoration-none small">Quay lại</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const discountType = '[[${discount.discountType}]]';
        const discountValue = parseFloat('[[${discount.discountValue}]]');

        const filterCategory = document.getElementById('filterCategory');
        const searchProduct = document.getElementById('searchProduct');
        const selectAll = document.getElementById('selectAll');
        const rows = document.querySelectorAll('#productTable tbody tr');

        // 1. Tính toán giá preview ngay khi load trang
        rows.forEach(row => {
            const originalPrice = parseFloat(row.querySelector('.original-price').getAttribute('data-price'));
            let specialPrice = (discountType === 'PERCENTAGE')
                ? originalPrice * (1 - discountValue / 100)
                : originalPrice - discountValue;

            specialPrice = Math.max(0, Math.round(specialPrice));
            row.querySelector('.preview-price').innerText = specialPrice.toLocaleString('vi-VN') + 'đ';
        });

        // 2. Logic lọc đa cấp (Cha - Con)
        function filterTable() {
            const searchVal = searchProduct.value.toLowerCase();
            const filterVal = filterCategory.value.toLowerCase();

            rows.forEach(row => {
                const productName = row.querySelector('.product-name').innerText.toLowerCase();
                const categoryName = row.getAttribute('data-category').toLowerCase();
                const parentName = row.getAttribute('data-parent').toLowerCase();

                const matchesSearch = productName.includes(searchVal);

                const matchesCategory = (filterVal === 'all' ||
                    categoryName === filterVal ||
                    parentName === filterVal);

                if (matchesSearch && matchesCategory) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });

            selectAll.checked = false;
        }

        filterCategory.addEventListener('change', filterTable);
        searchProduct.addEventListener('keyup', filterTable);

        // 3. Logic "Chọn tất cả" thông minh: Chỉ chọn những món đang hiển thị
        selectAll.onclick = function() {
            rows.forEach(row => {
                if (row.style.display !== 'none') {
                    row.querySelector('.item-checkbox').checked = this.checked;
                }
            });
        };
    });
</script>
</body>
</html>
