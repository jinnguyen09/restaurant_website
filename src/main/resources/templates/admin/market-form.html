<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Quản Trị - PHỞ HẨM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="/css/admin.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f2f5; }
        :root { --market-color: #2e7d32; --market-hover: #1b5e20; }

        .form-container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); border: 1px solid #eef2f3; }
        .btn-save { background-color: var(--market-color); color: white; border: none; padding: 12px 30px; border-radius: 12px; transition: 0.3s; font-weight: 700; }
        .btn-save:hover { background-color: var(--market-hover); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(46, 125, 50, 0.3); }

        .form-label { font-weight: 600; color: #344767; font-size: 0.875rem; margin-bottom: 0.5rem; }
        .form-control, .form-select { border-radius: 12px; border: 1px solid #d2d6da; padding: 12px; transition: 0.2s; }
        .form-control:focus { border-color: var(--market-color); box-shadow: 0 0 0 2px rgba(46, 125, 50, 0.1); }

        .preview-img { width: 180px; height: 180px; object-fit: cover; border-radius: 16px; border: 2px dashed #dee2e6; padding: 4px; background: #fff; }
        .header-title { border-left: 5px solid var(--market-color); padding-left: 15px; }
        .section-title { font-size: 1rem; font-weight: 700; color: var(--market-color); margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .bg-market-light { background-color: #e8f5e9; }
    </style>
</head>
<body>
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='market')}"></div>

<div class="container py-4">
    <div class="form-container">
        <div class="header-title mb-4">
            <h3 class="fw-bold text-dark mb-0" th:text="${productDto.productId == null ? 'Nhập hàng hóa mới' : 'Cập nhật thông tin hàng hóa'}"></h3>
            <p class="text-muted small mt-1">Quản lý kho hàng sản phẩm đóng gói & nhu yếu phẩm</p>
        </div>

        <form th:action="@{/admin/market/save}" th:object="${productDto}" method="post" enctype="multipart/form-data">
            <input type="hidden" th:field="*{productId}">
            <input type="hidden" th:field="*{imageUrl}">

            <div class="row g-4">
                <div class="col-12">
                    <div class="section-title"><i class="fa-solid fa-box-archive me-2"></i>Thông tin hàng hóa</div>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Tên sản phẩm đóng gói <span class="text-danger">*</span></label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="VD: Tương ớt nguyên chất Phở Hẩm" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Danh mục hàng <span class="text-danger">*</span></label>
                    <select th:field="*{categoryId}" class="form-select" required>
                        <option value="">-- Chọn danh mục --</option>
                        <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
                    </select>
                </div>

                <div class="col-12">
                    <div class="section-title mt-3"><i class="fa-solid fa-tags me-2"></i>Giá bán & Tồn kho</div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Giá niêm yết (đ)</label>
                    <div class="input-group">
                        <input type="number" th:field="*{price}" class="form-control" required min="0" placeholder="0">
                        <span class="input-group-text bg-light">₫</span>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Số lượng tồn kho</label>
                    <div class="input-group">
                        <input type="number" th:field="*{stockQuantity}" class="form-control" placeholder="0">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-warehouse"></i></span>
                    </div>
                </div>

                <div class="col-12">
                    <div class="section-title mt-3"><i class="fa-solid fa-circle-info me-2"></i>Quy cách đóng gói</div>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Đơn vị tính</label>
                    <input type="text" th:field="*{unit}" class="form-control" placeholder="Chai, Gói, Hộp, Kg...">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Nhãn loại hàng (Type)</label>
                    <input type="text" th:field="*{type}" class="form-control" placeholder="VD: Đồ gia vị, Thực phẩm khô...">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Đặc điểm nổi bật</label>
                    <select th:field="*{isFeatured}" class="form-select">
                        <option th:value="false">Hàng phổ thông</option>
                        <option th:value="true">⭐ Hàng bán chạy / Hot Deal</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Trạng thái kho hàng</label>
                    <select th:field="*{isAvailable}" class="form-select">
                        <option th:value="true">🟢 Còn hàng</option>
                        <option th:value="false">🔴 Tạm hết hàng</option>
                    </select>
                </div>

                <div class="col-12">
                    <div class="section-title mt-3"><i class="fa-solid fa-layer-group me-2"></i>Hình ảnh & Mô tả sản phẩm</div>
                </div>

                <div class="col-md-4 text-center">
                    <label class="form-label d-block text-start">Ảnh chụp sản phẩm</label>
                    <div class="p-3 border rounded-4 bg-light shadow-sm">
                        <img id="previewMarket" th:src="${productDto.imageUrl != null ? productDto.imageUrl : 'https://via.placeholder.com/200'}" class="preview-img mb-3">
                        <input type="file" name="imageFile" id="imageInputMarket" class="form-control form-control-sm" accept="image/*">
                        <small class="text-muted mt-2 d-block">Định dạng JPG, PNG, WEBP</small>
                    </div>
                </div>

                <div class="col-md-8">
                    <label class="form-label">Mô tả chi tiết sản phẩm</label>
                    <textarea th:field="*{description}" class="form-control" rows="8" placeholder="Thông tin về thành phần, hạn sử dụng, hướng dẫn bảo quản..."></textarea>
                </div>

                <div class="col-12 d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-save flex-grow-1 py-3">
                        <i class="fa-solid fa-check-double me-2"></i>XÁC NHẬN LƯU KHO
                    </button>
                    <a th:href="@{/admin/market}" class="btn btn-light border py-3 px-4 fw-bold shadow-sm" style="border-radius: 12px;">
                        HỦY BỎ
                    </a>
                </div>
            </div>
        </form>
    </div>
</div>

<script>
    document.getElementById('imageInputMarket').onchange = evt => {
        const [file] = evt.target.files;
        if (file) {
            document.getElementById('previewMarket').src = URL.createObjectURL(file);
        }
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
