<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang Quản Trị - PHỞ HẨM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="/css/admin.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #f4f7f6; }
    .form-container { max-width: 900px; margin: 40px auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); border: 1px solid #eef2f3; }
    .btn-save { background-color: #c62828; color: white; border: none; padding: 12px 30px; border-radius: 12px; transition: 0.3s; font-weight: 700; }
    .btn-save:hover { background-color: #a52121; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(198, 40, 40, 0.3); }
    .form-label { font-weight: 600; color: #344767; font-size: 0.875rem; margin-bottom: 0.5rem; }
    .form-control, .form-select { border-radius: 12px; border: 1px solid #d2d6da; padding: 12px; transition: 0.2s; }
    .form-control:focus { border-color: #c62828; box-shadow: 0 0 0 2px rgba(198, 40, 40, 0.1); }
    .preview-img { width: 180px; height: 180px; object-fit: cover; border-radius: 16px; border: 2px dashed #dee2e6; padding: 4px; background: #fff; }
    .header-title { border-left: 5px solid #c62828; padding-left: 15px; }
    .section-title { font-size: 1rem; font-weight: 700; color: #c62828; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
  </style>
</head>
<body>
<div th:replace="~{layout/admin/admin-navbar :: header-admin(activePage='menu')}"></div>

<div class="container py-4">
  <div class="form-container">
    <div class="header-title mb-4">
      <h3 class="fw-bold text-dark mb-0" th:text="${productDto.productId == null ? 'Thêm món ăn mới' : 'Cập nhật món ăn'}"></h3>
      <p class="text-muted small mt-1">Hệ thống quản lý thực đơn chi nhánh: <span class="text-danger fw-bold" th:text="${session.currentBranchName}"></span></p>
    </div>

    <form th:action="@{/admin/menu/save}" th:object="${productDto}" method="post" enctype="multipart/form-data">
      <input type="hidden" th:field="*{productId}">
      <input type="hidden" th:field="*{imageUrl}">

      <div class="row g-4">
        <div class="col-12">
          <div class="section-title"><i class="fa-solid fa-info-circle me-2"></i>Thông tin cơ bản</div>
        </div>

        <div class="col-md-8">
          <label class="form-label">Tên món ăn <span class="text-danger">*</span></label>
          <input type="text" th:field="*{name}" class="form-control" placeholder="VD: Phở Bò Tái Lăn" required>
        </div>

        <div class="col-md-4">
          <label class="form-label">Danh mục món <span class="text-danger">*</span></label>
          <select th:field="*{categoryId}" class="form-select" required>
            <option value="">-- Chọn danh mục --</option>
            <option th:each="cat : ${categories}" th:value="${cat.categoryId}" th:text="${cat.categoryName}"></option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Giá bán niêm yết (VND)</label>
          <div class="input-group">
            <input type="number" th:field="*{price}" class="form-control" required min="0" placeholder="0">
            <span class="input-group-text bg-light">VND</span>
          </div>
        </div>

        <div class="col-12">
          <div class="section-title mt-3"><i class="fa-solid fa-sliders me-2"></i>Thông số & Trạng thái</div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Đơn vị tính</label>
          <input type="text" th:field="*{unit}" class="form-control" placeholder="Bát, Đĩa, Ly...">
        </div>

        <div class="col-md-4">
          <label class="form-label">Thời gian chuẩn bị (Phút)</label>
          <div class="input-group">
            <input type="number" th:field="*{preparationTime}" class="form-control" placeholder="15">
            <span class="input-group-text bg-light"><i class="fa-regular fa-clock"></i></span>
          </div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Số lượng bán</label>
          <input type="number" th:field="*{stockQuantity}" class="form-control" placeholder="0">
        </div>

        <div class="col-md-6">
          <label class="form-label">Trạng thái kinh doanh</label>
          <select th:field="*{isAvailable}" class="form-select">
            <option th:value="true">🟢 Đang bán (Hiển thị)</option>
            <option th:value="false">🔴 Ngừng bán (Ẩn khỏi menu)</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Loại món</label>
          <select th:field="*{isFeatured}" class="form-select">
            <option th:value="false">Món ăn bình thường</option>
            <option th:value="true">🔥 Món ăn nổi bật - Best seller</option>
          </select>
        </div>

        <div class="col-12">
          <div class="section-title mt-3"><i class="fa-solid fa-image me-2"></i>Hình ảnh & Mô tả</div>
        </div>

        <div class="col-md-4">
          <label class="form-label">Ảnh minh họa</label>
          <div class="text-center p-3 border rounded-4 bg-light">
            <img id="preview" th:src="${productDto.imageUrl != null ? productDto.imageUrl : 'https://via.placeholder.com/200'}" class="preview-img mb-3 shadow-sm">
            <input type="file" name="imageFile" id="imageInput" class="form-control form-control-sm" accept="image/*">
            <small class="text-muted mt-2 d-block">Khuyên dùng ảnh tỉ lệ 1:1</small>
          </div>
        </div>

        <div class="col-md-8">
          <label class="form-label">Mô tả chi tiết món ăn</label>
          <textarea th:field="*{description}" class="form-control" rows="8" placeholder="Nhập mô tả về hương vị, thành phần món ăn..."></textarea>
        </div>

        <div class="col-12 d-flex gap-3 mt-4">
          <button type="submit" class="btn btn-save flex-grow-1 py-3">
            <i class="fa-solid fa-save me-2"></i>LƯU THÔNG TIN MÓN ĂN
          </button>
          <a th:href="@{/admin/menu}" class="btn btn-light border py-3 px-4 fw-bold shadow-sm" style="border-radius: 12px;">
            HỦY BỎ
          </a>
        </div>
      </div>
    </form>
  </div>
</div>

<script>
  document.getElementById('imageInput').onchange = evt => {
    const [file] = evt.target.files;
    if (file) {
      document.getElementById('preview').src = URL.createObjectURL(file);
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
