<!DOCTYPE html>
<html lang="vi" class="scroll-smooth"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Phở Hầm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Saira:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet">
</head>
<body class="bg-gray-50 index-page">

    <main class="min-h-screen flex items-center justify-center bg-gradient-to-br from-amber-50 via-white to-orange-100 py-12 px-4 font-sans">
        <div class="max-w-md w-full bg-white rounded-[2.5rem] shadow-[0_20px_60px_-15px_rgba(0,0,0,0.1)] p-10 md:p-12 border border-white/50 backdrop-blur-sm animate-fadeIn">
            
            <div class="text-center mb-10">
                <div class="inline-block p-4 bg-amber-400 rounded-3xl shadow-lg shadow-amber-100 mb-6 group transition-transform hover:rotate-6">
                    <div class="w-12 h-12 flex items-center justify-center text-white text-2xl font-black italic">PH</div>
                </div>
                <h1 class="text-4xl font-black text-red-800 mb-2 tracking-tight">Đăng nhập</h1>
                <p class="text-gray-500 font-medium">Chào mừng bạn trở lại với <span class="text-red-600 font-bold">PHỞ HẦM</span></p>
            </div>

            <div th:if="${param.error}" class="mb-4 bg-red-50 border border-red-200 text-red-600 px-4 py-2 rounded-xl text-xs font-bold text-center">
                Tài khoản hoặc mật khẩu không chính xác!
            </div>

            <div th:if="${param.success}" class="mb-4 bg-green-50 border border-green-200 text-green-600 px-4 py-2 rounded-xl text-xs font-bold text-center">
                Đăng ký thành công! Mời bạn đăng nhập.
            </div>

            <form th:action="@{/do-login}" method="POST" class="space-y-6">
                <div class="group">
                    <label class="block text-sm font-bold text-gray-700 mb-2 ml-1 group-focus-within:text-red-600 transition-colors">Email hoặc Số điện thoại</label>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 transition-colors">👤</span>
                        <label>
                            <input type="text" name="username" placeholder="Nhập email hoặc số điện thoại" required
                                class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-red-500 focus:ring-4 focus:ring-red-500/10 outline-none transition-all shadow-inner">
                        </label>
                    </div>
                </div>

                <div class="group">
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="text-sm font-bold text-gray-700 group-focus-within:text-red-600 transition-colors">Mật khẩu</label>
                        <a href="#" class="text-xs font-bold text-red-600 hover:underline">Quên mật khẩu?</a>
                    </div>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-red-500 transition-colors">🔒</span>
                        <label>
                            <input type="password" name="password" id="password" placeholder="••••••••" required
                                class="w-full pl-12 pr-6 py-4 bg-gray-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-red-500 focus:ring-4 focus:ring-red-500/10 outline-none transition-all shadow-inner">
                        </label>
                        <button type="button" onclick="togglePassword('password', 'eye-icon')"
                                class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-red-500 transition-colors">
                            <i id="eye-icon" class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="flex items-center px-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-red-600 border-gray-300 rounded focus:ring-red-500 cursor-pointer">
                    <label for="remember" class="ml-2 text-sm font-medium text-gray-600 cursor-pointer select-none">Ghi nhớ tôi trên thiết bị này</label>
                </div>

                <button type="submit" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-red-100 transition-all transform hover:-translate-y-1 active:scale-[0.98] flex items-center justify-center gap-2">
                    Đăng nhập ngay
                </button>
            </form>

            <div class="mt-10 text-center space-y-4">
                <p class="text-sm text-gray-500 font-medium">
                    Chưa có tài khoản?
                    <a th:href="@{/sign-up}" class="text-red-600 font-black hover:underline underline-offset-4 ml-1">Đăng ký ngay</a>
                </p>
                
                <div class="pt-4 border-t border-gray-100">
                    <a th:href="@{/home}" class="inline-flex items-center text-xs font-bold text-gray-400 hover:text-gray-900 transition-colors group">
                        <span class="mr-2 group-hover:-translate-x-1 transition-transform">←</span>
                        Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </main>
    <script src="/js/main.js"></script>
    <script>
        function togglePassword(inputId, iconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }
    </script>
</body>
</html>
