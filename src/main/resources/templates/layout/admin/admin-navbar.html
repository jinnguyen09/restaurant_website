<header th:fragment="header-admin" class="header-admin pb-4" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <div class="bg-white rounded-circle p-2 me-3" style="width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-solid fa-bowl-food text-danger fs-4"></i>
                </div>
                <div>
                    <h2 class="fw-bold m-0 fs-4">TRANG QUẢN TRỊ <span class="fw-light opacity-75">ADMIN</span></h2>
                </div>
            </div>

            <div class="dropdown me-auto ms-4">
                <button sec:authorize="hasRole('ROLE_ADMIN')"
                        class="d-flex align-items-center gap-2 border-0 shadow-sm"
                        type="button" id="branchDropdown" data-bs-toggle="dropdown" aria-expanded="false"
                        th:style="${currentBranch != null}
                            ? 'font-size: 14px; font-weight: 700; color: #b91c1c; background-color: #fef2f2; padding: 6px 16px; border-radius: 9999px; border: 1px solid #fee2e2 !important;'
                            : 'font-size: 14px; font-weight: 700; color: #ffffff; background-color: #dc3545; padding: 6px 16px; border-radius: 9999px; border: 2px solid #ffffff !important; animation: pulse 2s infinite;'">
                    <i class="fa-solid fa-location-dot"></i>
                    <span th:text="${currentBranch != null ? currentBranch.name : 'VUI LÒNG CHỌN CHI NHÁNH!'}">Chi nhánh</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 10px;"></i>
                </button>

                <div sec:authorize="!hasRole('ROLE_ADMIN')"
                     class="d-flex align-items-center gap-2"
                     style="font-size: 14px; font-weight: 700; color: #4b5563; background-color: #f3f4f6; padding: 6px 16px; border-radius: 9999px; border: 1px solid #e5e7eb;">
                    <i class="fa-solid fa-shop"></i>
                    <span th:text="${currentBranch != null ? currentBranch.name : 'Chi nhánh của bạn'}">Chi nhánh</span>
                </div>

                <ul sec:authorize="hasRole('ROLE_ADMIN')" class="dropdown-menu shadow-lg border-0 mt-2" aria-labelledby="branchDropdown">
                    <li><h6 class="dropdown-header font-bold text-dark">Hệ thống chi nhánh</h6></li>
                    <li th:each="branch : ${branches}">
                        <a class="dropdown-item d-flex align-items-center py-2"
                           th:href="@{/admin/change-branch/{id}(id=${branch.restaurantId})}"
                           th:classappend="${currentBranch != null && currentBranch.restaurantId == branch.restaurantId} ? 'active fw-bold' : ''">
                            <i class="fa-solid fa-shop me-2 small"></i>
                            <span th:text="${branch.name}">Tên chi nhánh</span>
                        </a>
                    </li>
                </ul>
            </div>

            <div class="d-flex gap-2">
                <button class="btn btn-link text-white text-decoration-none px-3 border-0"><i class="fa-solid fa-bell"></i></button>
                <a th:href="@{/home}" class="btn btn-light btn-sm rounded-pill px-4 fw-600 text-decoration-none text-dark shadow-sm">
                    <i class="fa-solid fa-house-user me-1"></i> Về trang người dùng
                </a>
            </div>
        </div>

        <nav class="admin-navbar d-flex flex-wrap gap-1">
            <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')" th:href="@{/admin/home}"
               th:classappend="${activePage == 'home'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-chart-pie me-2"></i>Tổng quan
            </a>

            <a th:href="@{/admin/customer}" th:classappend="${activePage == 'customer'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-user-group me-2"></i>Khách hàng
            </a>

            <a th:href="@{/admin/menu}" th:classappend="${activePage == 'menu'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-utensils me-2"></i>Thực đơn
            </a>
            <a th:href="@{/admin/review}" th:classappend="${activePage == 'review'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-comment-dots me-2"></i>Đánh giá
                <span class="badge-count-nav">5</span>
            </a>
            <a th:href="@{/admin/table}" th:classappend="${activePage == 'table'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-table-cells me-2"></i>Quản lý bàn
                <span class="badge-count-nav">2</span>
            </a>
            <a th:href="@{/admin/reservation}" th:classappend="${activePage == 'reservation'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-calendar-check me-2"></i>Đặt bàn
                <span class="badge-count-nav">1</span>
            </a>
            <a th:href="@{/admin/market}" th:classappend="${activePage == 'market'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-cart-shopping me-2"></i>Mua sắm
            </a>
            <a th:href="@{/admin/order}" th:classappend="${activePage == 'order'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-receipt me-2"></i>Đơn hàng
                <span class="badge-count-nav">12</span>
            </a>

            <a th:href="@{/admin/blog}" th:classappend="${activePage == 'blog'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-pen-nib me-2"></i>Blog
            </a>
            <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')" th:href="@{/admin/notification}"
               th:classappend="${activePage == 'notification'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-bell me-2"></i>Thông báo
            </a>
            <a th:href="@{/admin/discount}" th:classappend="${activePage == 'discount'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-tag me-2"></i>Giảm giá
            </a>
            <a th:href="@{/admin/category}" th:classappend="${activePage == 'category'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-tag me-2"></i>Danh mục
            </a>
            <a sec:authorize="hasAnyRole('ROLE_ADMIN', 'ROLE_MANAGER')" th:href="@{/admin/staff}" th:classappend="${activePage == 'staff'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-user-tie me-2"></i>Quản lý nhân viên
            </a>
            <a sec:authorize="hasRole('ROLE_ADMIN')" th:href="@{/admin/restaurant/list}" th:classappend="${activePage == 'restaurant'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-code-branch me-2"></i>Chi nhánh
            </a>
            <a th:href="@{/admin/voucher}" th:classappend="${activePage == 'voucher'} ? 'active' : ''" class="nav-link-custom">
                <i class="fa-solid fa-tag me-2"></i>Voucher
            </a>
        </nav>
    </div>
</header>
