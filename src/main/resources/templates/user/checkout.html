<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Thanh toán - Phở Hầm</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">

<div class="max-w-7xl mx-auto px-4 py-10">
  <a th:href="@{/menu}" class="text-gray-500 hover:text-red-600 transition-all flex items-center gap-2 mb-6">
    <i class="fa-solid fa-arrow-left"></i>
    <span>Quay lại thực đơn</span>
  </a>

  <h1 class="text-3xl font-black text-gray-800 mb-8 uppercase">Xác nhận đơn hàng</h1>

  <form th:action="@{/order/place}" method="post" class="flex flex-col lg:flex-row gap-8">
    <!-- Dữ liệu ẩn để gửi về Backend (Khớp với Order Entity) -->
    <input type="hidden" name="restaurantId" th:value="${branchConfig.restaurantId}">
    <input type="hidden" name="shippingFee" id="input-shipping-fee" th:value="${branchConfig.defaultShippingFee}">
    <input type="hidden" name="taxAmount" id="input-tax-amount" value="0">
    <input type="hidden" name="amountDiscounted" id="input-discount-amount" value="0">
    <input type="hidden" name="totalPrice" id="input-total-price" value="0">

    <div class="flex-1 space-y-6">
      <!-- Section: Hình thức nhận hàng -->
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-truck-fast text-red-600"></i> Hình thức đơn hàng
        </h3>
        <div class="grid grid-cols-2 gap-4">
          <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all">
            <input type="radio" name="orderType" value="DELIVERY" checked onchange="toggleDeliveryFields()" class="w-4 h-4 text-red-600">
            <span class="ml-3 font-semibold">Giao hàng tận nơi</span>
          </label>
          <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all">
            <input type="radio" name="orderType" value="TAKEAWAY" onchange="toggleDeliveryFields()" class="w-4 h-4 text-red-600">
            <span class="ml-3 font-semibold">Đến lấy trực tiếp</span>
          </label>
        </div>
      </div>

      <!-- Section: Thông tin khách hàng -->
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-location-dot text-red-600"></i> Thông tin giao hàng
        </h3>
        <div class="grid grid-cols-1 gap-4">
          <div id="address-section">
            <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ nhận hàng</label>
            <textarea name="deliveryAddress" id="deliveryAddress" required
                      class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none transition-all"
                      placeholder="Số nhà, tên đường, phường/xã..." rows="3"></textarea>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú cho nhà hàng</label>
            <input type="text" name="orderNotes"
                   class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-red-500 outline-none"
                   placeholder="Ví dụ: Không hành, nhiều ớt...">
          </div>
        </div>
      </div>

      <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-credit-card text-red-600"></i> Phương thức thanh toán
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all border-red-200 bg-red-50">
            <input type="radio" name="paymentMethod" value="TRANSFER" checked class="w-4 h-4 text-red-600">
            <div class="ml-3">
              <span class="block font-semibold">Chuyển khoản (PayOS)</span>
              <span class="text-xs text-gray-500">Tự động xác nhận ngay</span>
            </div>
          </label>
          <label class="relative flex items-center p-4 border rounded-2xl cursor-pointer hover:bg-gray-50 transition-all">
            <input type="radio" name="paymentMethod" value="CASH" class="w-4 h-4 text-red-600">
            <div class="ml-3">
              <span class="block font-semibold">Tiền mặt</span>
              <span class="text-xs text-gray-500">Thanh toán khi nhận hàng</span>
            </div>
          </label>
        </div>
      </div>
    </div>

    <!-- Tóm tắt đơn hàng (Sidebar) -->
    <div class="w-full lg:w-[400px]">
      <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100 sticky top-6">
        <h3 class="text-xl font-bold mb-6 border-b pb-4">Đơn hàng của bạn</h3>

        <!-- Danh sách món ăn -->
        <div class="space-y-4 mb-6 max-h-[300px] overflow-y-auto pr-2">
          <div th:each="item : ${cartItems}" class="flex justify-between items-center text-sm">
            <div class="flex gap-3">
              <span class="font-bold text-red-600" th:text="${item.quantity} + 'x'"></span>
              <span class="text-gray-700 font-medium" th:text="${item.productName}"></span>
            </div>
            <span class="font-bold text-gray-800"
                  th:text="${#numbers.formatDecimal(item.price * item.quantity, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
          </div>
        </div>

        <!-- Mã giảm giá -->
        <div class="mb-6 p-4 bg-red-50 rounded-2xl border border-red-100">
          <label class="block text-sm font-bold text-red-800 mb-2">
            <i class="fa-solid fa-ticket"></i> Voucher của bạn
          </label>
          <select name="voucherId" id="voucher-select" onchange="updatePricing()"
                  class="w-full px-3 py-2 rounded-xl border-none focus:ring-2 focus:ring-red-500 outline-none text-sm font-medium">
            <option value="" data-discount="0" data-min="0">Không sử dụng mã</option>
            <option th:each="uv : ${availableVouchers}"
                    th:value="${uv.voucher.voucherId}"
                    th:data-discount="${uv.voucher.discountAmount}"
                    th:data-min="${uv.voucher.minOrderValue}"
                    th:disabled="${cartTotal < uv.voucher.minOrderValue}"
                    th:text="${uv.voucher.voucherName + (cartTotal < uv.voucher.minOrderValue ? ' (Chưa đủ điều kiện)' : ' (-' + #numbers.formatDecimal(uv.voucher.discountAmount, 0, 'COMMA', 0, 'POINT') + 'đ)')}">
            </option>
          </select>
        </div>

        <!-- Tích điểm & Quy đổi -->
        <div class="mb-6 p-4 bg-orange-50 rounded-2xl border border-orange-100">
          <label class="block text-sm font-bold text-orange-800 mb-2">
            <i class="fa-solid fa-coins"></i> Sử dụng điểm tích lũy
          </label>
          <div class="flex items-center gap-2">
            <input type="number" name="pointsUsed" id="points-input"
                   th:max="${userPoints}" min="0" value="0" oninput="updatePricing()"
                   class="w-full px-3 py-2 rounded-xl border border-orange-200 focus:ring-2 focus:ring-orange-500 outline-none text-sm font-medium"
                   placeholder="Số điểm muốn dùng...">
          </div>
          <p class="text-[10px] text-orange-600 mt-2 italic">
            * Bạn hiện có: <span class="font-bold" th:text="${userPoints}"></span> điểm. <br>
            * Tỉ lệ: <span th:text="${branchConfig.pointRedemptionRate}"></span>đ / 1 điểm.
          </p>
          <!-- Input ẩn để lưu số tiền giảm từ điểm -->
          <input type="hidden" name="pointDiscountAmount" id="input-point-discount" value="0">
        </div>

        <!-- Chi tiết tiền -->
        <div class="space-y-3 border-t pt-4 text-sm">
          <div class="flex justify-between">
            <span class="text-gray-500">Tạm tính:</span>
            <span class="font-bold" th:text="${#numbers.formatDecimal(cartTotal, 0, 'COMMA', 0, 'POINT') + 'đ'}"></span>
          </div>
          <div class="flex justify-between text-green-600">
            <span>Voucher giảm giá:</span>
            <span id="display-discount" class="font-bold">-0đ</span>
          </div>
          <div class="flex justify-between text-orange-600">
            <span>Giảm giá từ điểm:</span>
            <span id="display-point-discount" class="font-bold">-0đ</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Phí giao hàng:</span>
            <span id="display-shipping" class="font-bold">0đ</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-500">Thuế (<span th:text="${branchConfig.taxRate * 100}"></span>%):</span>
            <span id="display-tax" class="font-bold">0đ</span>
          </div>
          <div class="flex justify-between border-t pt-4 text-lg">
            <span class="font-black text-gray-800">TỔNG CỘNG:</span>
            <span id="display-total" class="font-black text-red-600">0đ</span>
          </div>
        </div>

        <button type="submit"
                class="w-full mt-8 py-4 bg-red-600 text-white rounded-2xl font-black shadow-xl hover:bg-red-700 transition-all uppercase tracking-widest text-sm">
          Xác nhận đặt hàng
        </button>
      </div>
    </div>
  </form>
</div>

<script th:inline="javascript">
  const cartTotal = /*[[${cartTotal}]]*/ 0;
  const branchShipping = /*[[${branchConfig.defaultShippingFee}]]*/ 0;
  const taxRate = /*[[${branchConfig.taxRate}]]*/ 0;

  // THÊM 2 BIẾN NÀY ĐỂ LẤY DỮ LIỆU TỪ BACKEND
  const pointRate = /*[[${branchConfig.pointRedemptionRate}]]*/ 0;
  const userMaxPoints = /*[[${userPoints}]]*/ 0;

  function toggleDeliveryFields() {
    const orderType = document.querySelector('input[name="orderType"]:checked').value;
    const addressSection = document.getElementById('address-section');
    const addressInput = document.getElementById('deliveryAddress');

    if (orderType === 'TAKEAWAY') {
      addressSection.classList.add('hidden');
      addressInput.removeAttribute('required');
      addressInput.value = "Nhận tại cửa hàng";
    } else {
      addressSection.classList.remove('hidden');
      addressInput.setAttribute('required', 'required');
      addressInput.value = "";
    }
    updatePricing();
  }

  function updatePricing() {
    const voucherSelect = document.getElementById('voucher-select');
    const selectedOption = voucherSelect.options[voucherSelect.selectedIndex];
    const pointsInput = document.getElementById('points-input');

    // 1. Tính Voucher
    const minOrderValue = parseFloat(selectedOption.getAttribute('data-min')) || 0;
    let voucherDiscount = parseFloat(selectedOption.getAttribute('data-discount')) || 0;

    if (cartTotal < minOrderValue) {
      alert(`Đơn hàng chưa đủ ${minOrderValue.toLocaleString('vi-VN')}đ để áp dụng mã này.`);
      voucherSelect.value = "";
      voucherDiscount = 0;
    }

    // 2. TÍNH TOÁN ĐIỂM QUY ĐỔI
    let pointsUsed = parseInt(pointsInput.value) || 0;

    // Ngăn người dùng nhập quá số điểm đang có
    if (pointsUsed > userMaxPoints) {
      pointsUsed = userMaxPoints;
      pointsInput.value = userMaxPoints;
    }
    if (pointsUsed < 0) {
      pointsUsed = 0;
      pointsInput.value = 0;
    }

    const pointDiscountAmount = pointsUsed * pointRate;

    // 3. Tính Phí & Thuế
    const orderType = document.querySelector('input[name="orderType"]:checked').value;
    const currentShipping = (orderType === 'DELIVERY') ? branchShipping : 0;
    const currentTax = Math.round(cartTotal * taxRate);

    // 4. Tính Tổng cuối cùng (Trừ cả voucher và điểm quy đổi)
    const finalTotal = cartTotal + currentShipping + currentTax - voucherDiscount - pointDiscountAmount;
    const finalTotalSafe = finalTotal > 0 ? finalTotal : 0;

    // 5. Hiển thị giao diện
    document.getElementById('display-shipping').innerText = currentShipping.toLocaleString('vi-VN') + 'đ';
    document.getElementById('display-tax').innerText = currentTax.toLocaleString('vi-VN') + 'đ';
    document.getElementById('display-discount').innerText = '-' + voucherDiscount.toLocaleString('vi-VN') + 'đ';
    document.getElementById('display-point-discount').innerText = '-' + pointDiscountAmount.toLocaleString('vi-VN') + 'đ';
    document.getElementById('display-total').innerText = finalTotalSafe.toLocaleString('vi-VN') + 'đ';

    // 6. Gán giá trị vào Input Hidden để gửi về Backend
    document.getElementById('input-shipping-fee').value = currentShipping;
    document.getElementById('input-tax-amount').value = currentTax;
    document.getElementById('input-discount-amount').value = voucherDiscount + pointDiscountAmount; // Tổng tiền được giảm
    document.getElementById('input-point-discount').value = pointDiscountAmount;
    document.getElementById('input-total-price').value = finalTotalSafe;
  }

  window.onload = toggleDeliveryFields;

  document.querySelector('form').onsubmit = function() {
    const btn = this.querySelector('button[type="submit"]');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> Đang kết nối thanh toán...';
  };
</script>





</body>
</html>
