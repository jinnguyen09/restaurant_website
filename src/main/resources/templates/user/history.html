<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Phở Hầm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Saira:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/main.css" rel="stylesheet">
</head>
<body class="bg-[#fcfcfc] text-gray-800">

<div th:replace="~{layout/user/navbar :: header}"></div>

<main class="min-h-screen bg-gray-50 py-12 px-4 text-gray-800 antialiased">
        <div class="max-w-4xl mx-auto">
            
            <div class="text-center mb-10">
                <h1 class="text-4xl font-bold text-red-700 mb-2 tracking-tight">Lịch Sử Đơn Hàng</h1>
                <p class="text-gray-500 font-medium">Theo dõi tất cả các đơn hàng của bạn</p>
            </div>

            <div class="space-y-6">
                <div th:each="order : ${orders}" class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 hover:shadow-md transition-all duration-300">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <h3 class="text-xl font-bold text-gray-900 tracking-tight" th:text="'Đơn hàng #' + ${order.orderId}"></h3>

                                <span th:if="${order.status == 'PAID'}" class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-green-100 text-green-700">ĐÃ THANH TOÁN</span>
                                <span th:if="${order.status == 'PENDING'}" class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-yellow-100 text-yellow-700">CHỜ THANH TOÁN</span>
                                <span th:if="${order.status == 'CANCELLED'}" class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-red-100 text-red-700">ĐÃ HỦY</span>
                            </div>
                            <p class="text-sm text-gray-400 font-medium" th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></p>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-black text-red-700" th:text="${#numbers.formatDecimal(order.totalPrice, 0, 'COMMA', 0, 'POINT') + 'đ'}"></div>
                            <div class="text-xs font-bold text-green-600" th:text="'+' + ${order.pointEarned} + ' điểm'"></div>
                        </div>
                    </div>

                    <div class="space-y-2 mb-6">
                        <div th:each="item, iterStat : ${order.orderItems}" th:if="${iterStat.index < 2}" class="flex justify-between text-sm font-medium text-gray-600">
                            <span th:text="${item.itemName} + ' x ' + ${item.quantity}"></span>
                        </div>
                        <p th:if="${#lists.size(order.orderItems) > 2}" class="text-xs text-gray-400 italic">...và các món khác</p>
                    </div>

                    <div class="flex gap-3">
                        <a th:href="@{/order/detail/{id}(id=${order.orderId})}" class="flex-1 py-3 text-center rounded-2xl bg-gray-100 text-gray-600 font-bold text-sm hover:bg-gray-200 transition-all">
                            Xem chi tiết
                        </a>
                        <button class="flex-1 py-3 rounded-2xl border-2 border-red-600 text-red-600 font-bold text-sm hover:bg-red-600 hover:text-white transition-all">
                            Đặt lại đơn hàng
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

<div th:replace="~{layout/user/footer :: footer_section}"></div>
    <script src="/js/main.js"></script>
</body>
</html>
