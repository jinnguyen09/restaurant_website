<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông báo - Phở Hầm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Saira:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="/css/main.css" rel="stylesheet">
</head>
<body class="bg-[#fcfcfc] text-gray-800">

<div th:replace="~{layout/user/navbar :: header}"></div>

<main class="min-h-screen bg-gray-50 py-12 px-4 font-sans text-gray-800">
    <div class="max-w-4xl mx-auto">

        <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
            <div>
                <h1 class="text-4xl font-bold text-red-600 mb-2">Thông Báo</h1>
                <p class="text-gray-600">
                    Bạn có <span class="font-semibold text-gray-900" th:text="${unreadCount}">0</span> thông báo chưa đọc
                </p>
            </div>
            <form th:action="@{/notification/mark-all-read}" method="post">
                <button type="submit" class="px-6 py-2 border border-red-600 text-red-600 rounded-full text-sm font-medium hover:bg-red-50 transition-colors duration-300">
                    Đánh dấu tất cả đã đọc
                </button>
            </form>
        </div>

        <div class="space-y-4">
            <div th:each="noti : ${notifications}"
                 th:classappend="${noti.isRead} ? 'bg-white/60 border-gray-200' : 'bg-white border-red-500 shadow-sm'"
                 class="relative group p-6 rounded-2xl border-2 transition-all duration-300 transform hover:-translate-y-1 cursor-pointer">

                <a th:href="${noti.linkUrl != null ? noti.linkUrl : '#'}" class="flex items-start gap-4">
                    <div class="p-3 rounded-full"
                         th:classappend="${noti.status == 'SUCCESS' ? 'bg-green-100' : (noti.status == 'PROMO' ? 'bg-yellow-100' : 'bg-blue-100')}">

                        <i th:class="${noti.status == 'SUCCESS' ? 'fas fa-check text-green-600' : 'fas fa-bell text-blue-600'}"></i>
                    </div>

                    <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">
                            <h3 class="font-bold text-lg" th:text="${noti.title}"
                                th:classappend="${noti.isRead} ? 'text-gray-600' : 'text-gray-900'">Tiêu đề</h3>
                            <span th:if="${!noti.isRead}" class="bg-red-600 text-white text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider">Mới</span>
                        </div>
                        <p class="mb-2" th:text="${noti.content}"
                           th:classappend="${noti.isRead} ? 'text-gray-500' : 'text-gray-700 font-medium'">Nội dung thông báo</p>

                        <span class="text-gray-400 text-sm italic"
                              th:text="${#temporals.format(noti.createAt, 'HH:mm dd/MM/yyyy')}">10:30 01/02/2026</span>
                    </div>
                </a>
            </div>

            <div th:if="${#lists.isEmpty(notifications)}" class="text-center py-20">
                <p class="text-gray-500">Bạn hiện không có thông báo nào.</p>
            </div>

            <div th:if="${totalPages > 0}" class="flex justify-center items-center mt-10 gap-2">
                <a th:href="@{/notifications(page=${currentPage - 1})}"
                   th:classappend="${currentPage == 0} ? 'pointer-events-none opacity-50' : ''"
                   class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-chevron-left"></i>
                </a>

                <div class="flex gap-2">
                    <a th:each="pageNumber : ${#numbers.sequence(0, totalPages - 1)}"
                       th:href="@{/notifications(page=${pageNumber})}"
                       th:text="${pageNumber + 1}"
                       th:classappend="${pageNumber == currentPage} ? 'bg-red-600 text-white border-red-600' : 'bg-white border-gray-300 hover:bg-gray-50'"
                       class="w-10 h-10 flex items-center justify-center border rounded-lg font-medium transition">
                    </a>
                </div>

                <a th:href="@{/notifications(page=${currentPage + 1})}"
                   th:classappend="${currentPage >= totalPages - 1} ? 'pointer-events-none opacity-50' : ''"
                   class="px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    <i class="fas fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/user/footer :: footer_section}"></div>

<script src="/js/main.js"></script>
</body>
</html>
